name: EduTrak CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edutrak_test

jobs:
  # ==================== BUILD & TEST ====================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edutrak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        env:
          HUSKY: 0
        run: npm ci
      - name: 🔍 Type check
        run: npm run type-check:server

        
      - name: 🎨 Check code formatting
        run: npm run format:check

      - name: 🔎 Lint code
        run: npm run lint

      - name: 🗄️ Generate Prisma Client
        run: npm run db:generate

      - name: ✅ Validate Prisma schema
        run: npm run db:validate

      - name: 🔧 Setup test database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npm run db:migrate:deploy
          npm run db:seed

      - name: 🧪 Run unit tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key
        run: npm run test:unit

      - name: 🔗 Run integration tests
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key
        run: npm run test:integration

      - name: 🏗️ Build application
        run: npm run build

      - name: 🔒 Security audit
        run: npm run security:audit
        continue-on-error: true

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/edutrak-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY STAGING ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]  # Waits for Docker image to be built
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging-api.edutrak.co.ke

    steps:
      - name: 📥 Get Docker image tag
        id: tag
        run: |
          # Generate the same tag that docker-build used
          SHA_TAG=develop-${GITHUB_SHA::7}
          echo "image_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "full_image=${{ secrets.DOCKER_USERNAME }}/edutrak-api:$SHA_TAG" >> $GITHUB_OUTPUT

      - name: 🚀 Deploy to staging server using Docker
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            # 1. Log in to Docker Hub (server needs credentials)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 2. Pull the exact image we built in CI
            docker pull ${{ steps.tag.outputs.full_image }}
            
            # 3. Run database migrations (using a temporary container)
            docker run --rm \
              -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              ${{ steps.tag.outputs.full_image }} \
              npx prisma migrate deploy
            
            # 4. Stop and remove the old container (if running)
            docker stop edutrak-api-staging || true
            docker rm edutrak-api-staging || true
            
            # 5. Start the new container
            docker run -d \
              --name edutrak-api-staging \
              --restart unless-stopped \
              -p 3000:3000 \
              -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
              -e REDIS_URL="${{ secrets.STAGING_REDIS_URL }}" \
              -e NODE_ENV=staging \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              ${{ steps.tag.outputs.full_image }}
            
            # 6. Clean up old images (optional but recommended)
            docker image prune -f

      - name: 🏥 Health check
        run: |
          sleep 10
          curl -f ${{ secrets.STAGING_API_URL }}/health || exit 1

      - name: 📢 Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            🐳 Staging Deployment (Docker): ${{ job.status }}
            Image: ${{ steps.tag.outputs.full_image }}
            Branch: ${{ github.ref }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # ==================== DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.edutrak.co.ke

    steps:
    - name: 📥 Get Docker image tag
      id: tag
      run: |
        SHA_TAG=main-${GITHUB_SHA::7}
        echo "image_tag=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "full_image=${{ secrets.DOCKER_USERNAME }}/edutrak-api:$SHA_TAG" >> $GITHUB_OUTPUT

    - name: 💾 Backup production database (before deploying)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          BACKUP_FILE="/var/backups/edutrak/db_backup_$(date +%Y%m%d_%H%M%S).sql"
          pg_dump "${{ secrets.PROD_DATABASE_URL }}" > $BACKUP_FILE
          echo "Backup created: $BACKUP_FILE"

    - name: 🚀 Deploy to production server using Docker
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        port: 22
        script: |
          # Login to Docker Hub
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Pull the new image
          docker pull ${{ steps.tag.outputs.full_image }}
          
          # Run migrations (on production, be careful!)
          echo "Running database migrations..."
          docker run --rm \
            -e DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
            ${{ steps.tag.outputs.full_image }} \
            npx prisma migrate deploy
          
          # Stop old container
          docker stop edutrak-api || true
          docker rm edutrak-api || true
          
          # Start new container
          docker run -d \
            --name edutrak-api \
            --restart unless-stopped \
            -p 3000:3000 \
            -e DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
            -e REDIS_URL="${{ secrets.PROD_REDIS_URL }}" \
            -e NODE_ENV=production \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            ${{ steps.tag.outputs.full_image }}
          
          # Clean up old images
          docker image prune -f

    - name: 🏥 Health check
      run: |
        sleep 15
        curl -f ${{ secrets.PROD_API_URL }}/health || exit 1

    - name: 🔄 Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          # If the new container fails, restart the old one
          # But you need to know the previous image tag. 
          # A simpler approach: keep the old container running under a different name.
          # For rollback, just stop the new one and rename the old one back.
          
          # Example: if you saved previous container as edutrak-api-old
          docker stop edutrak-api || true
          docker rm edutrak-api || true
          docker rename edutrak-api-old edutrak-api 2>/dev/null || true
          docker start edutrak-api
          
          echo "Rolled back to previous version"

    - name: 📢 Notify deployment
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: |
          🚢 Production Deployment (Docker): ${{ job.status }}
          Image: ${{ steps.tag.outputs.full_image }}
          Commit: ${{ github.sha }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: 📝 Create GitHub Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Production deployment successful using Docker image
          Image: ${{ steps.tag.outputs.full_image }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false